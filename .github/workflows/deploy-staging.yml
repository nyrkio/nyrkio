name: Deploy (Staging)
on:
  pull_request:
    types: [labeled]

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  STAGING_DEPLOY_REQUEST_LABEL: deploy:staging
  STAGING_DEPLOY_SUCCESS_LABEL: deployed:staging
  STAGING_DEPLOY_FAILURE_LABEL: deploy-failed:staging

jobs:
  authorize:
    if: github.event.action == 'labeled' && github.event.label.name == env.STAGING_DEPLOY_REQUEST_LABEL
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Authorize deploy trigger actor
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const username = context.actor;

            const resp = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username,
            });

            const perm = resp.data.permission;
            const allowed = ['admin', 'maintain', 'write'].includes(perm);
            core.info(`staging deploy authz: actor=${username} permission=${perm} allowed=${allowed}`);
            core.setOutput('allowed', allowed ? 'true' : 'false');

  docker-images:
    needs: authorize
    if: github.event.action == 'labeled' && github.event.label.name == env.STAGING_DEPLOY_REQUEST_LABEL && needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout this repo (nyrkio)
        uses: actions/checkout@v2
        with:
          submodules: "true"

      - name: Check out nyrkio-proprietary
        uses: actions/checkout@master
        with:
          repository: nyrkio/nyrkio-proprietary
          path: p
          token: ${{ secrets.CHECKOUTP }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push the image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
          AWS_REGION: eu-north-1
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          NYRKIO_ENV_STAGING: ${{ secrets.NYRKIO_ENV_STAGING }}
          NYRKIO_PEM: ${{ secrets.NYRKIO_PEM }}
          SSL_CERT_CHAIN: ${{ secrets.SSL_CERT_CHAIN }}
          SSL_SECRET_KEY: ${{ secrets.SSL_SECRET_KEY }}
          NYRKIO_GH_RUNNER_SSH: ${{ secrets.NYRKIO_GH_RUNNER_SSH }}
          ENV: staging
        run: |
          mv p/frontend/src/static/* p/

          # Build a docker container and push it to ECR
          echo "$NYRKIO_ENV_STAGING" > .env.backend
          echo "$NYRKIO_PEM" > backend/keys/nyrkio.pem
          echo "$SSL_CERT_CHAIN" > nyrkio_com_chain.crt
          echo "$SSL_SECRET_KEY" > nyrkio.com.key
          if [ -n "${NYRKIO_GH_RUNNER_SSH:-}" ]; then
            echo "$NYRKIO_GH_RUNNER_SSH" > backend/keys/nyrkio-gh-runner-user
          fi
          pwd
          ls -a

          docker compose -f compose.yml build --progress=plain --no-cache --build-arg DOMAIN=staging.nyrkio.com
          echo "Pushing image to ECR..."
          docker push $ECR_REGISTRY/nyrkio/staging/nginx:$IMAGE_TAG
          docker push $ECR_REGISTRY/nyrkio/staging/backend:$IMAGE_TAG
          echo "image=$ECR_REGISTRY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deployment:
    needs: [authorize, docker-images]
    if: github.event.action == 'labeled' && github.event.label.name == env.STAGING_DEPLOY_REQUEST_LABEL && needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout this repo (nyrkio)
        uses: actions/checkout@v2
        with:
          submodules: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: docker compose up
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
          AWS_REGION: eu-north-1
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          NYRKIO_ENV_STAGING: ${{ secrets.NYRKIO_ENV_STAGING }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ENV: staging
        run: |
          echo "$NYRKIO_ENV_STAGING" > .env.backend
          # Derived from https://github.com/ArwynFr/actions-docker-context/blob/master/action.yml
          mkdir -p $HOME/.ssh
          if [ -z "$SSH_AGENT_PID" ]; then
            eval $(ssh-agent)
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
            echo "SSH_AGENT_PID=SSH_AGENT_PID" >> $GITHUB_ENV
          fi

          ssh-keyscan staging.nyrkio.com >> $HOME/.ssh/known_hosts

          echo "$SSH_PRIVATE_KEY" | ssh-add -

          docker context create $ENV --docker "host=ssh://$SSH_USER@staging.nyrkio.com"
          docker context use $ENV

          docker --context $ENV compose -f compose.yml up --no-build -d nginx backend webhooks worker01

  label-result:
    needs: [authorize, docker-images, deployment]
    if: always() && github.event.action == 'labeled' && github.event.label.name == env.STAGING_DEPLOY_REQUEST_LABEL
    runs-on: ubuntu-latest
    steps:
      - name: Update PR labels with deployment result
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const requested = process.env.STAGING_DEPLOY_REQUEST_LABEL;
            const success = process.env.STAGING_DEPLOY_SUCCESS_LABEL;
            const failure = process.env.STAGING_DEPLOY_FAILURE_LABEL;

            const authorized = '${{ needs.authorize.outputs.allowed }}' === 'true';
            const results = ['${{ needs.docker-images.result }}', '${{ needs.deployment.result }}'];
            const overall = authorized && results.every(r => r === 'success') ? 'success' : 'failure';
            const target = overall === 'success' ? success : failure;
            const remove = [requested, success, failure].filter(l => l !== target);

            for (const name of remove) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [target],
            });
