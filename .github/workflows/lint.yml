name: Lint

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Sync submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule status --recursive
      - name: Build CI image
        run: docker build -t nyrkio-ci -f Dockerfile.ci .
      - name: Lint
        run: docker run --rm -v "$GITHUB_WORKSPACE:/repo" -w /repo nyrkio-ci make lint-inner

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Sync submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule status --recursive
      - name: Build CI image
        run: docker build -t nyrkio-ci -f Dockerfile.ci .
      - name: Format check
        run: docker run --rm -v "$GITHUB_WORKSPACE:/repo" -w /repo nyrkio-ci make format-check-inner
